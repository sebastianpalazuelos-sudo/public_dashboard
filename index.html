<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ARAM Engine Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
<h1>ARAM Engine</h1>
<nav class="top-tabs">
    <button class="tab-button active" data-view="home">HOME</button>
    <button class="tab-button" data-view="players">PLAYERS</button>
    <button class="tab-button" data-view="champions">CHAMPIONS</button>
    <button class="tab-button" data-view="matches">MATCHES</button>
    <button class="tab-button" data-view="splits">SPLITS</button>
    </nav>
</header>

<main>
<div id="view-home" class="app-view active-view">
<section>
  <h2>Split Ranking</h2>
  <div id="home-global-split-ranking"></div>
</section>

</div>

<div id="view-players" class="app-view">

<section>
  <h2>👥 Players</h2>

  <select id="players-player-select">
    <option value="">Select Player...</option>
  </select>

  <div id="players-player-results"></div>
</section>

</div>

<div id="view-champions" class="app-view">

<section>
    <h2>⚔️ Champions</h2>

  <input
    id="champion-search-input"
    class="champion-search-input"
    placeholder="Search Champion..."
    list="champion-search-options"
  >

  <datalist id="champion-search-options"></datalist>

  <select id="champions-champion-select">
    <option value="">Select Champion..</option>
  </select>

  <div id="champions-champion-results"></div>

  <hr>

  <h3> Champion Specialization </h3>

  <select id="champion-representative-metric-select">
    <option value="">Select Specialization..</option>
    <option value="dmg_share">DMG </option>
    <option value="cc_share">CC </option>
    <option value="tank_share">Tank </option>
    <option value="kp">KP% </option>
    <option value="kill">Kill% </option>
  </select>

  <div id="champion-representative-results"></div>

  <hr>

<h3>Champion Tendencies</h3>

<select id="champion-tendencies-metric-select">
  <option value="">Select criterion...</option>
  <option value="dmg_share">Damage</option>
  <option value="cc_share">Control</option>
  <option value="tank_share">Tank</option>
  <option value="kp">KP%</option>
  <option value="kill">Kill%</option>
</select>

<div id="champion-tendencies-results"></div>
</section>

</div>

<div id="view-splits" class="app-view">

<section>

    <h2>🏁 Splits</h2>

    <div class="player-profile-card">

        <h3>Split #1</h3>

        <div class="meta">
            12 Jun 2026 — 31 Jul 2026
        </div>
        <div class="meta" id="current-split-matches"></div>

    </div>

</section>

</div>

<div id="view-matches" class="app-view">

<section>

<h2>🗂 Match Explorer</h2>

<input
    id="match-search-input"
    class="match-search-input"
    placeholder="Search Match ID..."
>

<select id="match-select">
    <option value="">Select Match...</option>
</select>

<div id="match-results"></div>

</section>

</div>

</main>

<script src="js/app.js"></script>
</body>
</html>
